# Example config.toml file for youtui containing the application defaults.
auth_type = "Browser"
downloader_type = "YtDlp"
yt_dlp_command = "yt-dlp"

# Global keybinds
[keybinds.global]
"+" = "vol_up"
"-" = "vol_down"
">" = "next_song"
"<" = "prev_song"
"]" = "seek_forward"
"[" = "seek_back"
"?" = {action = "toggle_help", visibility = "global"}
q = {action = "quit", visibility = "global"}
F11 = {action = "view_logs", visibility = "global"}
F2 = {action = "toggle_browser", visibility = "global"}
F3 = {action = "toggle_playlist", visibility = "global"}
space = {action = "play_pause", visibility = "global"}
C-c = "quit"
C-e = {action = "edit_config", visibility = "global"}

# Global keybind mode names
[mode_names.global]

[keybinds.playlist]
"/" = {action = "playlist.toggle_search", visibility = "global"}
d.d = "playlist.delete_selected"
d.g = "playlist.delete_to_top"
d.G = "playlist.delete_to_bottom"
y = {action = "playlist.copy_song_url", visibility = "global"}
n = {action = "playlist.next_search_result", visibility = "global"}
N = {action = "playlist.prev_search_result", visibility = "global"}
enter.enter = "playlist.play_selected"
enter.n = "playlist.save_to_new_playlist"
o.enter = "playlist.play_selected"
o.d = "playlist.delete_selected"
o.l = "playlist.view_lyrics"
o.y = "playlist.copy_song_url"
o.v = "playlist.view_album_cover"
o.a = "playlist.go_to_artist"
o.b = "playlist.go_to_album"
o.s = "playlist.toggle_shuffle"
o.A = "playlist.set_best_quality"
o.c = "playlist.toggle_playlist_category_filter"
o.D = "playlist.delete_all"
o.I = "playlist.view_song_info"
o.z = "playlist.toggle_repeat"
o.t = "playlist.toggle_like"

[mode_names.playlist]
enter = "Playlist Action"
o = "Context Menu"
d = "Delete"

[keybinds.browser]
"/" = {action = "browser.search", visibility = "global"}
F1 = {action = "browser.search", visibility = "global"}
h = "browser.left"
l = "browser.right"
F7 = {action = "browser.change_search_type", visibility = "global"}

[keybinds.browser_artists]
enter = "browser_artists.display_selected_artist_albums"

[keybinds.browser_search]
C-n = "browser_search.next_search_suggestion"
C-p = "browser_search.prev_search_suggestion"
esc = "browser_search.close"

[keybinds.browser_artist_songs]
3 = {action = "browser_artist_songs.filter", visibility = "global"}
4 = {action = "browser_artist_songs.sort", visibility = "global"}
y = {action = "browser_artist_songs.view_lyrics", visibility = "global"}
c = {action = "browser_artist_songs.toggle_category_filter", visibility = "global"}
o.enter = "browser_artist_songs.play_song"
o.p = "browser_artist_songs.play_songs"
o.a = "browser_artist_songs.play_album"
o.P = "browser_artist_songs.add_songs_to_playlist"
o.A = "browser_artist_songs.add_album_to_playlist"
o.e = "browser_artist_songs.add_song_to_existing_playlist"
o.E = "browser_artist_songs.add_songs_to_existing_playlist"
o." " = "browser_artist_songs.add_song_to_playlist"
enter.enter = "browser_artist_songs.play_song"
enter.p = "browser_artist_songs.play_songs"
enter.a = "browser_artist_songs.play_album"
enter.space = "browser_artist_songs.add_song_to_playlist"
enter.P = "browser_artist_songs.add_songs_to_playlist"
enter.A = "browser_artist_songs.add_album_to_playlist"
enter.e = "browser_artist_songs.add_song_to_existing_playlist"
enter.E = "browser_artist_songs.add_songs_to_existing_playlist"

[mode_names.browser_artist_songs]
enter = "Play"
o = "Context Menu"

[keybinds.browser_playlists]
enter = "browser_playlists.display_selected_playlist"

[keybinds.browser_playlist_songs]
3 = {action = "browser_playlist_songs.filter", visibility = "global"}
4 = {action = "browser_playlist_songs.sort", visibility = "global"}
y = {action = "browser_playlist_songs.view_lyrics", visibility = "global"}
o.enter = "browser_playlist_songs.play_song"
o.p = "browser_playlist_songs.play_songs"
o.P = "browser_playlist_songs.add_songs_to_playlist"
o.e = "browser_playlist_songs.add_song_to_existing_playlist"
o.E = "browser_playlist_songs.add_songs_to_existing_playlist"
o." " = "browser_playlist_songs.add_song_to_playlist"
enter.enter = "browser_playlist_songs.play_song"
enter.p = "browser_playlist_songs.play_songs"
enter.space = "browser_playlist_songs.add_song_to_playlist"
enter.P = "browser_playlist_songs.add_songs_to_playlist"
enter.e = "browser_playlist_songs.add_song_to_existing_playlist"
enter.E = "browser_playlist_songs.add_songs_to_existing_playlist"

[mode_names.browser_playlist_songs]
enter = "Play"
o = "Context Menu"

[keybinds.browser_library]
y = {action = "browser_library.copy_song_url", visibility = "global"}
o.enter = "browser_library.play_song"
o.p = "browser_library.play_songs"
o.P = "browser_library.add_songs_to_playlist"
o.y = "browser_library.copy_song_url"

[mode_names.browser_library]
o = "Context Menu"

[keybinds.browser_songs]
3 = {action = "browser_songs.filter", visibility = "global"}
4 = {action = "browser_songs.sort", visibility = "global"}
y = {action = "browser_songs.view_lyrics", visibility = "global"}
o.enter = "browser_songs.play_song"
o.p = "browser_songs.play_songs"
o.P = "browser_songs.add_songs_to_playlist"
o.e = "browser_songs.add_song_to_existing_playlist"
o.E = "browser_songs.add_songs_to_existing_playlist"
o." " = "browser_songs.add_song_to_playlist"
enter.enter = "browser_songs.play_song"
enter.p = "browser_songs.play_songs"
enter.space = "browser_songs.add_song_to_playlist"
enter.P = "browser_songs.add_songs_to_playlist"
enter.e = "browser_songs.add_song_to_existing_playlist"
enter.E = "browser_songs.add_songs_to_existing_playlist"

[mode_names.browser_songs]
enter = "Play"
o = "Context Menu"

[keybinds.help]
"?" = {action = "help.close", visibility = "global"}
esc = {action = "help.close", visibility = "hidden"}
q = {action = "help.close", visibility = "hidden"}

[keybinds.filter]
esc = {action = "filter.close", visibility = "hidden"}
3 = {action = "filter.close", visibility = "global"}
Enter = {action = "filter.apply", visibility = "global"}
A-3 = {action = "filter.clear_filter", visibility = "global"}

[keybinds.sort]
enter = {action = "sort.sort_selected_asc", visibility = "global"}
A-enter = {action = "sort.sort_selected_desc", visibility = "global"}
A-4 = {action = "sort.clear_sort", visibility = "global"}
esc = {action = "sort.close", visibility = "hidden"}
4 = {action = "sort.close", visibility = "global"}

[keybinds.log]
S-left = "log.reduce_captured"
S-right = "log.increase_captured"
left = "log.reduce_shown"
right = "log.increase_shown"
k = "log.up"
j = "log.down"
C-u = "log.page_up"
C-d = "log.page_down"
t = "log.toggle_hide_filtered"
esc = "log.exit_page_mode"
f = "log.toggle_target_focus"
h = "log.toggle_target_selector"

[keybinds.text_entry]
enter = {action = "text_entry.submit", visibility = "hidden"}
left = {action = "text_entry.left", visibility = "hidden"}
right = {action = "text_entry.right", visibility = "hidden"}
backspace = {action = "text_entry.backspace", visibility = "hidden"}
C-w = {action = "text_entry.delete_word", visibility = "hidden"}

[keybinds.list]
up = {action = "list.up", visibility = "hidden"}
down = {action = "list.down", visibility = "hidden"}
k = {action = "list.up", visibility = "hidden"}
j = {action = "list.down", visibility = "hidden"}
pageup = "list.page_up"
pagedown = "list.page_down"
C-b = "list.page_up"
C-u = "list.page_up"
C-f = "list.page_down"
C-d = "list.page_down"
g = "list.first"
G = "list.last"

[keybinds.playlist_save_popup]
k = "playlist_save_popup.move_up"
j = "playlist_save_popup.move_down"
enter = "playlist_save_popup.save"
esc = {action = "playlist_save_popup.cancel", visibility = "global"}

[scrobbling]
enabled = false
api_key = ""
api_secret = ""
session_key = ""
